<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>County OSINT Tool</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body { margin: 0; }

    #map {
      height: 100vh;
      width: 100%;
    }

    #info-box {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1000;
      background: white;
      padding: 12px;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      width: 250px;
      font-family: Arial, sans-serif;
    }

    #info-box h3 {
      margin-top: 0;
    }
	
	#search-container {
	  position: absolute;
	  top: 20px;
	  left: 50%;
	  transform: translateX(-50%);
	  z-index: 2000;

	  background: white;
	  padding: 8px;
	  border-radius: 6px;
	  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
	}
  </style>
</head>
<body>

<div id="map"></div>

<div id="search-container">
	<input id="countySearch" type="text" placeholder="Search county..." />
</div>

<div id="info-box">
  <h3>County Info</h3>
  <p>Click a county</p>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>
